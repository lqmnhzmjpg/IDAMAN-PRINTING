<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDAMAN PRINTING</title>

<!-- FONT (LEBIH HAMPIR) -->
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background-color: red;
    padding: 15px 0;
}

.nav {
    display: flex;
    justify-content: center;
    gap: 40px;
}

.nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}

.nav a:hover {
    opacity: 0.7;
}

/* HERO */
.hero {
    background-color: red;
    color: white;
    text-align: center;
    padding: 20px 20px 80px;
}

.hero h1 {
    font-family: 'Russo One', sans-serif;
    font-size: 56px;
    letter-spacing: 4px;
    margin-bottom: 50px;
    text-transform: uppercase;
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
}

.feature-item {
    text-align: center;
}

.feature-item i {
    font-size: 45px;
    margin-bottom: 15px;
}

.feature-item p {
    font-size: 16px;
    margin: 0;
}
</style>

</head>

<body>

<header>
    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Location</a>
        <a href="#">Contact Us</a>
    </nav>
</header>

<section class="hero">
    <h1>IDAMAN PRINTING</h1>

    <div class="features">
        <div class="feature-item">
            <i class="fas fa-print"></i>
            <p>Printing Press</p>
        </div>

        <div class="feature-item">
            <i class="fas fa-id-card"></i>
            <p>Business Card</p>
        </div>

        <div class="feature-item">
            <i class="fas fa-pen-nib"></i>
            <p>Graphic Design</p>
        </div>

        <div class="feature-item">
            <i class="fas fa-image"></i>
            <p>Large Format</p>
        </div>
    </div>
</section>

</body>
</html>
